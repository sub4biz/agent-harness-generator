name: CI

# Full 3-platform matrix across every gate.
# Ubuntu 22.04 / macOS 14 / Windows 2022 must all green before merge.
#
# Lessons baked in:
#   - `/tmp` does NOT resolve on Windows (use os.tmpdir()).
#   - File paths in test fixtures MUST be normalised via path.join + posix.
#   - WASM binary path separators differ; the loader is platform-agnostic.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Rust workspace — 3 platforms
  # ─────────────────────────────────────────────────────────────────────
  rust:
    name: Rust / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ matrix.os }}
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --verbose
      - name: cargo doc -D warnings
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # ─────────────────────────────────────────────────────────────────────
  # WASM build + validate — 3 platforms
  # (validates the pipeline works on every OS, not just ubuntu)
  # ─────────────────────────────────────────────────────────────────────
  wasm:
    name: WASM / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-${{ matrix.os }}
      - name: Install wasm-pack (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install wasm-pack (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # Pin wasm-pack 0.13.1 — newer versions (0.15+) lock `cargo-platform`
        # transitively at a level that needs rustc 1.91+, breaking our 1.88
        # workspace toolchain pin. Drop --locked so cargo can pick compatible
        # transitives if needed.
        run: cargo install wasm-pack --version 0.13.1
      - name: Install wasm-tools
        # Pin to a version compatible with workspace rust 1.88 — newer
        # wasm-tools rev their MSRV aggressively (1.252 needed 1.85,
        # 1.260+ may need 1.91). 1.250.0 is known-stable on 1.88.
        run: cargo install wasm-tools --version 1.250.0
      - name: Build wasm bundler target
        run: wasm-pack build crates/kernel-wasm --target bundler --release
      - name: Validate wasm
        shell: bash
        run: wasm-tools validate crates/kernel-wasm/pkg/*.wasm
      - name: Size budget gate (< 500 KB, ADR-002a)
        shell: bash
        run: |
          set -euo pipefail
          for f in crates/kernel-wasm/pkg/*.wasm; do
            sz=$(wc -c < "$f" | tr -d ' ')
            echo "wasm: $f size=$sz"
            if [ "$sz" -gt 512000 ]; then
              echo "::error::wasm size $sz exceeds 500 KB hard budget (ADR-002a)"
              exit 1
            fi
          done

  # ─────────────────────────────────────────────────────────────────────
  # Node tests — 3 platforms × 2 Node versions
  # ─────────────────────────────────────────────────────────────────────
  node:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [wasm]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install
        run: npm ci || npm install
      - name: TypeScript build
        run: npm run build
      - name: TypeScript tests
        run: npm test
      - name: Path-handling guard (the /tmp Windows bug regression test)
        shell: bash
        run: node scripts/path-guard.mjs
      - name: Healthcheck (iter 42 — daily-driver supercheck)
        # 6 read-only checks <1s: version coherence + plugin shape +
        # codex skills + workflows refs + path-guard wiring + examples
        # present. Acts as a fast structural gate per-OS-per-Node.
        shell: bash
        run: node scripts/healthcheck.mjs

  # ─────────────────────────────────────────────────────────────────────
  # Per-platform npm pack + install smoke for every published package
  # ─────────────────────────────────────────────────────────────────────
  pack-install:
    name: pack+install / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [node]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build all packages
        run: |
          npm ci || npm install
          npm run build
      - name: npm pack every published package
        shell: bash
        run: node scripts/pack-all.mjs
      - name: Install every tarball into a tmp project
        shell: bash
        run: node scripts/install-all.mjs

  # ─────────────────────────────────────────────────────────────────────
  # Bench (Linux only — others would be redundant for synthetic corpus)
  # ─────────────────────────────────────────────────────────────────────
  bench:
    name: Bench (smoke)
    runs-on: ubuntu-latest
    needs: [node]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
      - run: npm run build
      - name: Run benchmark (small corpus for smoke)
        run: BENCH_ITEMS=200 BENCH_QUERIES=50 BENCH_OUT=./bench-report.json npm --prefix packages/bench run bench
      - name: Upload bench report
        uses: actions/upload-artifact@v4
        with:
          name: bench-report
          path: packages/bench/bench-report.json
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────
  # Final gate — all jobs must pass
  # ─────────────────────────────────────────────────────────────────────
  ci-pass:
    name: CI passed
    needs: [rust, wasm, node, pack-install, bench]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All cross-platform gates green."
