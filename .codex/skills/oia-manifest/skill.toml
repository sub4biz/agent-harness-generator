# Codex skill: emit/validate the OIA cross-cutting manifest (ADR-034).
#
# Wraps the iter-121 `harness oia-manifest <path>` CLI command. The Open
# Intelligence Architecture (OIA) is a v0.1 9-layer reference model
# (Agentics Foundation, https://oia.agentics.org). OpenHarness emits a
# self-describing manifest declaring layer alignment + horizontal spans
# + adjacent standards (MCP, A2A, ACP, Agent Protocol).

[skill]
name = "oia-manifest"
version = "0.1.0"
description = "Emit .harness/oia-manifest.json declaring layer alignment with the OIA v0.1 9-layer reference architecture. Self-describes the harness's MCP wiring, witness signing, audit log, identity posture (always 'none' at v0.1). --check verifies an existing manifest, --dry-run prints without writing, --json emits to stdout."
author = "rUv <ruv@ruv.net>"
homepage = "https://github.com/ruvnet/agent-harness-generator"
license = "MIT"

[dispatch]
type = "mcp_tool"
server = "agent-harness-generator"
tool = "oia_manifest"

[command]
name = "oia-manifest"
synopsis = "Emit/validate the OIA v0.1 layer-alignment manifest (ADR-034)."

[[args]]
name = "path"
prompt = "Path to the harness directory"
required = true

[[args]]
name = "check"
prompt = "Validate the existing manifest shape instead of writing"
required = false
default = "false"

[[args]]
name = "dry-run"
prompt = "Print the manifest to stdout, do not write"
required = false
default = "false"

[[args]]
name = "json"
prompt = "Same as --dry-run; emit JSON to stdout"
required = false
default = "false"

[catalog]
tags = ["oia", "manifest", "interoperability", "governance", "ADR-034", "ADR-030"]
