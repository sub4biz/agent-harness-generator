# Codex skill manifest for example-harness.
#
# A one-command picker over the 18 live @metaharness/* example wrappers.
# Where `create-harness` walks the full template/host/agents wizard, this
# skill maps a use-case straight onto a published `npx @metaharness/<name>`
# package — the fastest path from "I want X" to a scaffolded harness.

[skill]
name = "example-harness"
version = "0.1.0"
description = "Scaffold a ready-made AI agent harness in one command from the 18 published @metaharness/* example packages — 8 host integrations (Claude Code, Codex, Hermes, pi.dev, OpenClaw, RVM, Copilot, OpenCode) + 10 vertical pods (devops, research, trading, support, legal, coding, education, sales, gaming, repo-maintainer)."
author = "rUv <ruv@ruv.net>"
homepage = "https://github.com/ruvnet/agent-harness-generator"
license = "MIT"

# Dispatches to the published npx wrapper — no MCP server needed; the
# wrapper itself shells out to metaharness@latest with the right flags.
[dispatch]
type = "shell"
command = "npx --yes @metaharness/${package}@latest ${name}"

[command]
name = "example-harness"
synopsis = "Scaffold a ready-made harness from a published @metaharness/* package"

[[args]]
name = "package"
prompt = "Which example package?"
required = true
choices = [
  "claude-code", "codex", "hermes", "pi-dev", "openclaw", "rvm", "copilot", "opencode",
  "devops", "research", "trading", "support", "legal", "coding", "education", "sales", "gaming", "repo-maintainer",
]

[[args]]
name = "name"
prompt = "New harness directory name (kebab-case)"
required = true
validate = "^[a-z0-9-]+$"
default = "my-bot"

[catalog]
tags = ["scaffolding", "agent-harness", "examples", "npx", "one-command", "mcp", "multi-agent"]
